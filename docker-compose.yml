services:
  mysql:
    image: mysql:8.4
    container_name: pokedex-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pokedex
    ports:
      - "3306:3306"
    volumes:
      - pokedex_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pokedex_mysql_data:
