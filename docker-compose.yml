services:
  postgres:
    image: postgres:16-alpine
    container_name: pokedex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pokedex
      POSTGRES_PASSWORD: pokedex
      POSTGRES_DB: pokedex
    ports:
      - "5432:5432"
    volumes:
      - pokedex_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokedex -d pokedex"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pokedex_postgres_data:
